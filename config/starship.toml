# config/starship.toml — two-line prompt per spec §4.6.
# Modules ON: directory, git_branch, git_commit, git_state, git_status,
#             cmd_duration, status, jobs, character.
# Modules OFF: hostname, username, time, battery, package, language prompts.

format = """
$directory\
$git_branch\
$git_commit\
$git_state\
$git_status\
$cmd_duration\
$status\
$jobs
$character"""

scan_timeout = 10
command_timeout = 300

[directory]
truncation_length = 3
truncation_symbol = "…/"
style = "bold cyan"

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold yellow"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
conflicted = "="
untracked = "?"
modified = "*"
staged = "+"

[git_state]
format = '\(🔀 $state( $progress_current/$progress_total)\) '
style = "bold red"

[cmd_duration]
min_time = 2_000
format = '[took $duration](bold yellow) '

[status]
disabled = false
format = '[$symbol]($style) '
symbol = "✗"
success_symbol = ""
style = "bold red"

[jobs]
symbol = "&"
style = "bold blue"
number_threshold = 1

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

# Explicitly OFF
[hostname]
disabled = true
[username]
disabled = true
[time]
disabled = true
[battery]
disabled = true
[package]
disabled = true
[python]
disabled = true
[nodejs]
disabled = true
[rust]
disabled = true
[golang]
disabled = true
