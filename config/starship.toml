format = "$directory$git_branch$git_status$python$kubernetes$cmd_duration$character"

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"

[directory]
truncation_length = 3

[git_branch]
format = "[$branch]($style) "

[git_status]
format = '([$all_status$ahead_behind]($style) )'

[cmd_duration]
min_time = 2_000
format = "[$duration]($style) "

[python]
format = '[${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'

[kubernetes]
disabled = false
format = '[$context(/$namespace)]($style) '
